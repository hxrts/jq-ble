[workspace]
crate_roots = ["crates"]
exclude_crates = []

[bundles.rust_base]
enabled = true
rust_roots = ["crates"]
docs_roots = ["docs", "toolkit"]

[checks.proc_macro_scope]
enabled = true
include_paths = [
  "crates/demo/tests/stranger_relay.rs",
  "crates/jq-client/src/bridge.rs",
  "crates/jq-client/src/effects.rs",
  "crates/jq-client/tests/common.rs",
  "crates/jq-link-profile/src/transport.rs",
]
required_markers = [
  "#[effect_trait",
  "#[effect_handler",
  "#[id_type",
  "#[bounded_value",
  "#[must_use_handle",
  "#[public_model",
  "#[purity",
  "#[jacquard_traits::purity",
  "tell! {",
]

[checks.docs_semantic_drift]
enabled = true
docs_roots = ["docs", "toolkit", "scripts"]
manifest_path = "Cargo.toml"
planned_crates = []

[checks.crate_root_policy]
enabled = true
required_attributes = ["#![forbid(unsafe_code)]"]

[checks.ignored_result]
enabled = true
include_paths = ["crates"]
allowed_comment_markers = ["allow-ignored-result:", "intentionally ignore result"]

[checks.unsafe_boundary]
enabled = true
include_paths = ["crates"]
allowed_path_parts = ["/raw/", "/ffi/", "/sys/"]
required_comment_markers = ["Safety:"]

[checks.public_type_width]
enabled = true
include_paths = ["crates"]
banned_types = ["usize", "isize", "f32", "f64"]

[checks.dependency_policy]
enabled = true
manifest_roots = ["crates"]
require_default_features_false = ["serde", "tokio", "futures"]
banned_dependencies = []

[checks.text_formatting]
enabled = true
include_paths = ["crates", "docs", "toolkit", "scripts", ".github"]
exclude_path_parts = ["/target/"]
